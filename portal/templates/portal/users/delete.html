{% extends 'portal/base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                </div>
                <h3 class="fw-bold mb-3">Delete User Account?</h3>
                <p class="text-muted mb-4">
                    Are you sure you want to delete the user <strong>{{ user_obj.username }}</strong> ({{ user_obj.get_full_name }})? 
                    This action is permanent and will remove their access to the system.
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg py-3 fw-bold">Delete Account Permanently</button>
                        <a href="{% url 'portal:user_portal_list' %}" class="btn btn-light btn-lg py-3 fw-bold mt-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
